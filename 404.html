<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — HunterOS</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="/icons/win9x.svg" type="image/svg+xml">
    <link rel="icon" href="/icons/favicon.png" type="image/png">
    <style>
        /* Self-contained on purpose: a 404 can be served from any bad path,
           so it shouldn't depend on styles.css loading. Palette matches the
           boot splash (deep plum-black, VT323). */
        @font-face {
            font-family: 'VT323';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('/fonts/vt323-latin.woff2') format('woff2');
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: #1d1822;
            color: #d8c7d2;
            font-family: 'VT323', monospace;
            font-size: 1.35rem;
            line-height: 1.55;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6vh 6vw;
            cursor: pointer;
        }
        .bsod { max-width: 38rem; }
        .bsod-head {
            display: inline-block;
            background: #d8a6b9;          /* rose title-bar pink */
            color: #1d1822;
            padding: 0 0.6em;
            margin-bottom: 1.2rem;
        }
        .bsod p { margin-bottom: 1rem; }
        .bsod a { color: #d8a6b9; }
        .blink { animation: blink 1s steps(1) infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        @media (prefers-reduced-motion: reduce) { .blink { animation: none; } }
    </style>
</head>
<body>
    <div class="bsod">
        <span class="bsod-head">HunterOS</span>
        <p>A fatal exception 0x194 has occurred at C:\hunter\that_page.
           The page you are looking for has been terminated.</p>
        <p>*  The file may have been moved, deleted, or never
           existed in the first place.</p>
        <p>*  Press any key to return to the desktop, or
           <a href="/">click here</a> if your keyboard is also missing.</p>
        <p><span class="blink">▮</span></p>
    </div>
    <script>
        // Any key or click goes home, like a real BSOD pretends to.
        document.addEventListener('keydown', () => location.href = '/');
        document.addEventListener('click', (e) => {
            if (!e.target.closest('a')) location.href = '/';
        });
    </script>
</body>
</html>
