<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Powell</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Desktop surface -->
    <div id="desktop">
        <div class="icons">
            <button class="desktop-icon" data-window="about" title="double-click to open">
                <span class="glyph">📄</span>
                <span class="label">about_me</span>
            </button>
            <button class="desktop-icon" data-window="projects" title="double-click to open">
                <span class="glyph">📁</span>
                <span class="label">projects</span>
            </button>
            <button class="desktop-icon" data-window="contact" title="double-click to open">
                <span class="glyph">✉️</span>
                <span class="label">contact</span>
            </button>
        </div>

    </div>

    <!-- Start menu -->
    <div class="start-menu" id="start-menu">
        <div class="sm-head">~/hunter</div>
        <button data-window="about"><span class="glyph">📄</span> about_me</button>
        <button data-window="projects"><span class="glyph">📁</span> projects</button>
        <button data-window="contact"><span class="glyph">✉️</span> contact</button>
        <div class="sm-sep"></div>
        <button data-link="https://github.com/hunterpowell"><span class="glyph">🌐</span> GitHub</button>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <button class="start-btn" id="start-btn">★ Start</button>
        <div class="task-items" id="task-items"></div>
        <a class="credit" href="https://instagram.com/saintjulianx" target="_blank" rel="noopener">
            Illustration by <strong>@saintjulianx</strong><span class="credit-extra">, inspiration for the site's aesthetic</span>
        </a>
        <span class="clock" id="clock">--:--</span>
    </div>

    <!-- ===================== Window templates ===================== -->

    <template id="tpl-about">
        <section class="window" style="width:460px;">
            <div class="title-bar">
                <span class="dot"></span>
                <span class="title">about_me.txt</span>
                <div class="title-controls">
                    <button aria-label="minimize">_</button>
                    <button aria-label="maximize">□</button>
                    <button aria-label="close">×</button>
                </div>
            </div>
            <div class="menu-bar">
                <span><u>F</u>ile</span><span><u>E</u>dit</span><span><u>V</u>iew</span><span><u>H</u>elp</span>
            </div>
            <div class="window-body">
                <h1>Hunter Powell</h1>
                <p class="subtitle">software developer · backend &amp; systems</p>
                <p>Computer Science student at Sacramento State (graduating May 2026).
                   I like building efficient backend systems and untangling hard problems
                   with code — mostly Python, with side trips into C++, Java, and lately Rust.</p>
                <p>Off the keyboard: movies, books, games, and wandering around outside.</p>
                <div class="tags">
                    <span class="tag">Python</span><span class="tag">C++</span>
                    <span class="tag">Java</span><span class="tag">Rust</span>
                    <span class="tag">Backend</span><span class="tag">Algorithms</span>
                </div>
                <p style="margin-top:1.25rem;">
                    <a href="#" class="btn" data-open="projects">See my work →</a>
                </p>
            </div>
        </section>
    </template>

    <template id="tpl-projects">
        <section class="window" style="width:540px;">
            <div class="title-bar">
                <span class="dot"></span>
                <span class="title">projects — C:\work</span>
                <div class="title-controls">
                    <button aria-label="minimize">_</button>
                    <button aria-label="maximize">□</button>
                    <button aria-label="close">×</button>
                </div>
            </div>
            <div class="menu-bar">
                <span><u>F</u>ile</span><span><u>E</u>dit</span><span><u>V</u>iew</span><span>Open</span>
            </div>
            <div class="window-body">
                <h2>Things I've built</h2>
                <div class="proj-grid">
                    <article class="proj-card">
                        <h3>Evolving Maze Solver</h3>
                        <p>Population-based genetic algorithm where robots learn to solve mazes
                           through selection and reproduction. C++ with OpenMP parallelization.</p>
                        <div class="tags">
                            <span class="tag">C++</span><span class="tag">Genetic Algorithms</span><span class="tag">OpenMP</span>
                        </div>
                        <p style="margin-top:0.75rem;">
                            <a href="https://github.com/hunterpowell/GeneticAlg" target="_blank" class="btn">GitHub →</a>
                        </p>
                    </article>
                    <article class="proj-card">
                        <h3>Procedural Tree Generator</h3>
                        <p>Recursive generator that grows unique cherry-blossom trees with
                           randomized branching, death chance, and petal placement. Python +
                           Tkinter, with a JS canvas port.</p>
                        <div class="tags">
                            <span class="tag">Python</span><span class="tag">Tkinter</span><span class="tag">Procedural Gen</span>
                        </div>
                        <p style="margin-top:0.75rem;">
                            <a href="https://github.com/hunterpowell/tree-gen" target="_blank" class="btn">GitHub →</a>
                        </p>
                    </article>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-contact">
        <section class="window" style="width:420px;">
            <div class="title-bar">
                <span class="dot"></span>
                <span class="title">connect.exe</span>
                <div class="title-controls">
                    <button aria-label="minimize">_</button>
                    <button aria-label="maximize">□</button>
                    <button aria-label="close">×</button>
                </div>
            </div>
            <div class="window-body">
                <h2>Let's connect</h2>
                <p>Open to opportunities, collaborations, or just chatting about tech.</p>
                <ul class="contact-list">
                    <li><span class="label">Email</span>
                        <a href="mailto:hunterpowell99@gmail.com">hunterpowell99@gmail.com</a></li>
                    <li><span class="label">GitHub</span>
                        <a href="https://github.com/hunterpowell" target="_blank">@hunterpowell</a></li>
                    <li><span class="label">LinkedIn</span>
                        <a href="https://linkedin.com/in/hunterpowell-dev" target="_blank">hunterpowell-dev</a></li>
                </ul>
            </div>
        </section>
    </template>

    <script src="desktop.js"></script>
</body>
</html>
