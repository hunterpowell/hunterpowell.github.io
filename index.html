                    <article class="proj-card">
                        <h3>Lydia's Law — Family Law Platform</h3>
                        <p>Full-stack Django platform built from scratch with an 8-person team
                           over 8 months for a family law firm. I helped design the 5-app modular
                           architecture and 3-tier role-based access (Guest / Client / Admin), and
                           built shared infrastructure – Stripe &amp; Calendly webhooks, Google OAuth,
                           and a CKEditor admin interface that lets non-technical staff publish
                           rich-text content site-wide without a developer.</p>
                        <div class="tags">
                            <span class="tag">Django</span><span class="tag">Python</span><span class="tag">MySQL</span>
                            <span class="tag">Stripe</span><span class="tag">OAuth</span><span class="tag">Team Project</span>
                        </div>
                        <p class="card-actions">
                            <a href="https://adoptionsofsac.com" target="_blank" class="btn">Visit site → (client work)</a>

                            <a href="#" class="btn" data-open="notes-lydia">Read more →</a>
                        </p>
                    </article>
                    <article class="proj-card">
                        <h3>Evolving Coverage Robots</h3>
                        <p>Genetic algorithm for the coverage problem: robots with limited energy
                           evolve movement rules to explore as much of an unknown grid as they can
                           before powering down. Over 200 generations of 500 agents they converge on a
                           boustrophedon row-sweep at &gt;90% average coverage; OpenMP parallelization cut a
                           full run from 138s to 5s (27x) in testing, and down to &lt;1s on the release build.
                           The live demo is a scaled-down JS port of the same algorithm —
                           wildcard genes, VISITED-cell sensing and all.</p>
                        <div class="tags">
                            <span class="tag">C++</span><span class="tag">OpenMP</span><span class="tag">Genetic Algorithms</span>
                        </div>
                        <p class="card-actions">
                            <a href="#" class="btn" data-open="robots">▶ Run demo</a>
                            <a href="https://github.com/hunterpowell/GeneticAlg" target="_blank" class="btn">GitHub →</a>
                            <a href="#" class="btn" data-open="notes-robots">Read more →</a>
                        </p>
                    </article>
                    <article class="proj-card">
                        <h3>Heart Disease Risk Classifier</h3>
                        <p>Binary classifier over 320K CDC BRFSS survey records (~8.6% positive)
                           benchmarking KNN, Logistic Regression, Random Forest, XGBoost, LightGBM,
                           CatBoost, and an MLP. Engineered clinically grounded features (composite
                           risk score, comorbidity counts) and selected predictors with LightGBM,
                           fit only on training folds to avoid leakage. Handled class imbalance via
                           <code>scale_pos_weight</code> rather than SMOTE, evaluating with stratified
                           5-fold CV on ROC-AUC, F1, and MCC.</p>
                        <div class="tags">
                            <span class="tag">Python</span><span class="tag">scikit-learn</span><span class="tag">LightGBM</span>
                            <span class="tag">XGBoost</span><span class="tag">Pandas</span><span class="tag">ML</span>
                        </div>
                        <p class="card-actions">
                            <a href="https://github.com/hunterpowell/HeartDisease" target="_blank" class="btn">GitHub →</a>
                            <a href="#" class="btn" data-open="notes-heart">Read more →</a>
                        </p>
                    </article>
                    <article class="proj-card">
                        <h3>Procedural Tree Generator</h3>
                        <p>Recursive generator that grows unique cherry-blossom trees with
                           randomized branching, death chance, and petal placement. Python +
                           Tkinter. (Demo simplified and written in JS).</p>
                        <div class="tags">

                        <p>The site you're looking at: a retro Win9x-style desktop, hand-built

                           terminal, a paint app, a notepad with autosave, and the
                           live project demos are all home-grown from scratch. The "no dependencies"
                           rule is the whole point, every pixel and interaction is mine to explain.</p>
                        <div class="tags">

            <div class="window-body">
                <h2>Lydia's Law – build notes</h2>
                <p class="subtitle">Shipping a real product for a real client, with a team of 8.</p>

                <h3>Why it mattered</h3>
                <p>This wasn't a class toy, it was a live site for a family law firm. Our non-technical
                   client had to be able to run it day-to-day, and her clients had to book and pay without
                   a developer in the loop. That constraint drove most of the design.</p>

                <h3>What I learned</h3>
                <ul class="notes-list">
                    <li>On a team of 8, architecture beats cleverness. The 5-app
                        modular split is what let us work in parallel without stepping on each other.</li>
                    <li>Role-based access (Guest / Client / Admin) has to be enforced server-side at
                        the view layer, hiding a button in the UI isn't security.</li>
                    <li>Stripe and Calendly webhooks are async and can fire more than once, so the
                        handlers had to be idempotent.</li>
                </ul>

                <h3>Pitfalls &amp; gotchas</h3>
                <ul class="notes-list">
                    <li>Handing non-technical staff a CKEditor admin page meant constraining what they could
                        publish so they couldn't break layouts site-wide. By creating editor boxes that allowed for anything
                        they may need to add, and sanitizing against any potentially problematic inputs, we created a product 
                        that will remain usable and receive consistent updates with minimal developer oversight. 
                    </li>
                    <li>Migrating to MySQL, I personally nuked every table holding the text content shown across the entire site.
                        We'd had everything living in one big table, and while modularizing it I ran the migrate command without
                        seeding the content into the new tables. This, to my utter horror, also wiped the original monotable back
                        to an empty state. Several hours and many cups of coffee later, we'd recovered everything from backups and
                        re-entered it by hand. Then I fixed the seeding and backups for good, so nothing like that can happen again.
                    </li>
                </ul>
            </div>
        </section>

            <div class="window-body">
                <h2>Evolving Coverage Robots – notes</h2>
                <p class="subtitle">Letting selection discover a strategy I never coded.</p>

                <h3>Why I built it</h3>
                <p>The question: can simple movement rules evolve to cover an unknown grid
                   better than anything I'd hand-code, under a strict energy budget? Yes, they can.</p>

                <h3>What I learned</h3>
                <ul class="notes-list">
                    <li>The coolest moment was watching a boustrophedon (back-and-forth
                        row sweep) emerge from random genomes. I didn't program that strategy,
                        selection found it on its own, hitting a generational average of &gt;90% coverage.
                        The catalyst for this behavior was the addition of the <code>VISITED</code> cell state. 
                        This gave each bot the ability to learn that there was no benefit to visiting a cell twice. 
                    </li>
                    <li>I accidentally stumbled onto the single most powerful tool my robots had: wildcard genes.
                        I first introduced them as one of the random states every gene could take at initialization, but that just
                        bred "lazy" bots that plateaued early. So I pulled wildcards out of initialization entirely &ndash; and
                        performance SKYROCKETED, several times past anything I'd seen before.
                        Then testing turned up something strange: wildcards were still finding their way into the gene pool.
                        The culprit was the mutation function. Every gene still had a tiny chance to mutate, and a wildcard was
                        still a valid result &ndash; I'd only removed it as an option at initialization, never in mutation.
                    </li>
                    <li>Fitness evaluation and gene crossover are both embarrassingly parallel, each genome runs independently and each child bot
                        relies on exactly 2 distinct parents. OpenMP integration in these two loops took a full run 
                        from <code>138s → 5s</code> (27x) in testing, eventually running in &lt;1s on the release build.
                    </li>
                </ul>

                <h3>Pitfalls &amp; gotchas</h3>
                <ul class="notes-list">
                    <li>Too much elitism and premature introduction of wildcard genes both caused premature convergence 
                        to a mediocre local optimum. Tournament selection and wildcards only through mutation kept/introduced
                        enough diversity to keep improving.</li>
                    <li>Parallel maps: initially I was just reseeding the same map over and over to save resources. This is not viable
                        when parallelizing, and I wanted to avoid creating a new map object for every individual, so I found a happy
                        medium. I created as many maps as the host machine has cores, OpenMP launches one thread per core, and reseeded those maps
                        as needed.
                    </li>
                    <li>The first time a robot successfully visited every cell and cleared the entire map, I thought it was a bug. It was happening
                        almost every time I ran the program, the top performer would clear every cell, and I spent hours trying to figure out how they 
                        were getting infinite energy. They weren't, they were consistently evolving to clear the entire map.
                    </li>
                </ul>
            </div>
        </section>
    </template>

            <div class="window-body">
                <h2>Heart Disease Classifier – notes</h2>
                <p class="subtitle">Doing the evaluation honestly on 320K messy survey records.</p>

                <h3>Why I built it</h3>
                <p>Predict heart-disease risk from a big, imbalanced public-health survey, and resist
                   every shortcut that would make the numbers look good but not generalize.</p>

                <h3>What I learned</h3>
                <ul class="notes-list">
                    <li>On an 8.6%-positive dataset, accuracy is a trap: a model that
                        predicts "no" for everyone scores ~91%. That's why I tracked ROC-AUC, F1, and
                        MCC instead.</li>
                    <li>Gradient-boosted trees (LightGBM / XGBoost / CatBoost) clearly beat KNN and the MLP
                        here, and LightGBM took the highest ROC-AUC of the bunch. ROC-AUC doesn't depend on
                        where you set the decision threshold, so it stays honest when you know you'll tune for
                        recall later &ndash; exactly the case in a medical context, where a missed positive
                        costs far more than a false alarm.
                    </li>
                    <li>Engineered features (a composite risk score, comorbidity counts, etc.) carried real
                        signal, domain framing mattered as much as the model.</li>
                </ul>

                <h3>Pitfalls I avoided</h3>
                <ul class="notes-list">
                    <li>Data leakage: feature selection and scaling were fit only on
                        the training folds, never the full set. Fit on everything and your CV scores
                        are optimistic fiction.</li>
                    <li>Used <code>scale_pos_weight</code> instead of SMOTE, reweighting the loss
                        rather than synthesizing fake patients, which I could defend clinically.</li>
                    <li>The first draft of this project had incredible results, suspiciously so. Further research
                        unearthed the issue: I was oversampling before splitting the data into training/testing sets. Doing 
                        so introduces so much synthetic data into the testing set, especially on such an imbalanced dataset,
                        that the results are not representative of real world performance.
                    </li>
                </ul>
            </div>
        </section>

                <h2>Procedural Tree Generator – notes</h2>
                <p class="subtitle">A handful of simple rules, a different tree every run.</p>

                <h3>Why I built it</h3>
                <p>I wanted to drill recursion in an interesting way, and generating a physical tree analog
                     seemed like a fun way to do it.
                </p>

                <h3>What I learned</h3>
                <ul class="notes-list">
                    <li>Recursion maps perfectly onto trees: each branch is just a smaller tree
                        at an angle. The whole generator is essentially one function calling
                        itself.
                    </li>
                    <li>A chance for each branch to die before splitting is what prevents the tree from looking
                        mechanical and unnatural. That, along with small variation in angle at which each child branch splits,
                        adds that last bit of flair that makes for a convincing tree. 
                    </li>
                </ul>

                <h3>Pitfalls &amp; gotchas</h3>
                <ul class="notes-list">
                    <li>Deep recursion + high branch odds = exponential blowup. Capping max depth keeps
                        it from hanging the page (or blowing up my computer).
                    </li>
                    <li>At one point, a typo in max branch depth caused the program to recurse several orders of magnitude
                        deeper than intended. That had my laptop begging for mercy.
                    </li>
                </ul>
            </div>
        </section>

                <ul class="notes-list">
                    <li>The first 90% of a project takes 10% of the time, and the last 10% takes 90% of the time.

                    </div>

                    <div class="settings-panel active" data-panel="saver">
                        <div class="ss-monitor">
                            <div class="ss-screen"><div class="ss-preview"></div></div>
                            <div class="ss-base"></div>
                        </div>
                        <label class="settings-row">
                            <input type="checkbox" data-set="enabled">
                            <span>Enable screensaver <span class="settings-muted">(bouncing DVD logo)</span></span>
                        </label>
                        <div class="settings-row">
                            <span>Wait</span>
                            <select data-set="idle">
                                <option value="5000">5 seconds</option>
                                <option value="15000">15 seconds</option>
                                <option value="30000">30 seconds</option>
                                <option value="60000">1 minute</option>
                                <option value="120000">2 minutes</option>
                                <option value="300000">5 minutes</option>
                            </select>
                            <span>of idle time</span>
                        </div>
                        <div class="settings-row">
                            <span>Background</span>
                            <select data-set="mode">
                                <option value="blackout">Black out screen</option>
                                <option value="dim">Dim the desktop</option>
                            </select>
                        </div>
                        <p class="settings-hint ss-reduced" hidden>
                            Screensaver is off because your system has
                            <b>reduce motion</b> turned on.
                        </p>
                    </div>

                    <div class="settings-panel" data-panel="appearance">
                        <label class="settings-row">
                            <input type="checkbox" data-set="theme">
                            <span>Dark mode <span class="settings-muted">(darker desktop &amp; windows)</span></span>
                        </label>
                        <label class="settings-row">
                            <input type="checkbox" data-set="crt">
                            <span>CRT effect <span class="settings-muted">(scanlines + flicker)</span></span>
                        </label>
                        <p class="settings-hint">A cathode-ray glow over the whole desktop.</p>
                    </div>

                    <div class="settings-actions">
                        <button class="btn" data-act="ok">OK</button>
                        <button class="btn" data-act="cancel">Cancel</button>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <script src="js/console-greeting.js"></script>
    <script src="js/boot.js"></script>
    <script src="js/tree.js"></script>
    <script src="js/robots.js"></script>
    <script src="js/winscroll.js"></script>
    <script src="js/paint.js"></script>
    <script src="js/defrag.js"></script>
    <script src="js/desktop.js"></script>
    <script src="js/screensaver.js"></script>
</body>
</html>
